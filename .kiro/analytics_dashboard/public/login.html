<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #020b18;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .background-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: 
        linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .glow-blob {
      position: fixed;
      border-radius: 50%;
      z-index: 0;
      pointer-events: none;
    }

    .glow-blob-1 {
      top: -120px;
      left: -80px;
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, rgba(56,189,248,0.07), transparent 70%);
    }

    .glow-blob-2 {
      bottom: -100px;
      right: -60px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(129,140,248,0.07), transparent 70%);
    }

    .login-container {
      position: relative;
      z-index: 1;
      background: rgba(15,23,42,0.8);
      border: 1px solid rgba(148,163,184,0.15);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 24px rgba(56,189,248,0.3);
    }

    .title {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #f1f5f9, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #64748b;
      margin-bottom: 32px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 8px;
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(15,23,42,0.6);
      border: 2px solid rgba(148,163,184,0.15);
      border-radius: 12px;
      color: #f1f5f9;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.3s;
      outline: none;
    }

    .form-input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 4px rgba(56,189,248,0.1);
      background: rgba(15,23,42,0.8);
    }

    .form-input::placeholder {
      color: #475569;
    }

    .login-button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 8px 24px rgba(56,189,248,0.3);
    }

    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(56,189,248,0.4);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .error-message {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      color: #f87171;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .info-text {
      text-align: center;
      font-size: 12px;
      color: #475569;
      margin-top: 24px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(148,163,184,0.2), transparent);
      margin: 24px 0;
    }
  </style>
</head>
<body>
  <div class="background-grid"></div>
  <div class="glow-blob glow-blob-1"></div>
  <div class="glow-blob glow-blob-2"></div>

  <div class="login-container">
    <div class="logo-container">
      <div class="logo">⚡</div>
    </div>
    
    <h1 class="title">Analytics Dashboard</h1>
    <p class="subtitle">Sign in to view analytics</p>

    <div class="error-message" id="errorMessage">
      Invalid credentials. Please try again.
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          class="form-input" 
          placeholder="Enter username"
          required
          autocomplete="username"
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          class="form-input" 
          placeholder="Enter password"
          required
          autocomplete="current-password"
        >
      </div>

      <button type="submit" class="login-button">
        Sign In
      </button>
    </form>

    <div class="divider"></div>

    <p class="info-text">
      RAG Analytics · Port 5000
    </p>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();

      // Simple validation - any non-empty username and password works
      if (username && password) {
        // Store login state in sessionStorage
        sessionStorage.setItem('analyticsLoggedIn', 'true');
        sessionStorage.setItem('analyticsUsername', username);
        
        // Redirect to dashboard
        window.location.href = '/dashboard';
      } else {
        errorMessage.classList.add('show');
        setTimeout(() => {
          errorMessage.classList.remove('show');
        }, 3000);
      }
    });

    // Check if already logged in
    if (sessionStorage.getItem('analyticsLoggedIn') === 'true') {
      window.location.href = '/dashboard';
    }
  </script>
</body>
</html>
